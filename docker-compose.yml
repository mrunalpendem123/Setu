version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: setu-postgres
    environment:
      POSTGRES_USER: setu
      POSTGRES_PASSWORD: setu
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setu"]
      interval: 5s
      timeout: 5s
      retries: 5

  merchant:
    build: ./merchant
    container_name: setu-merchant
    environment:
      DATABASE_URL: postgresql+psycopg://setu:setu@postgres:5432/merchant
      INDUS_API_KEYS: demo_key
      HYPERSWITCH_API_KEY: ${HYPERSWITCH_API_KEY}
      HYPERSWITCH_BASE_URL: ${HYPERSWITCH_BASE_URL:-https://sandbox.hyperswitch.io}
      MERCHANT_NAME: "Demo Merchant"
      MERCHANT_URL: "https://merchant.example.com"
      MERCHANT_PRIVACY_URL: "https://merchant.example.com/privacy"
      MERCHANT_TOS_URL: "https://merchant.example.com/terms"
      MERCHANT_SUPPORT_URL: "https://merchant.example.com/support"
      MERCHANT_BRAND: "Demo Brand"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  indus:
    build: ./indus
    container_name: setu-indus
    environment:
      DATABASE_URL: postgresql+psycopg://setu:setu@postgres:5432/indus
      INDUS_API_KEY: demo_key
      HYPERSWITCH_API_KEY: ${HYPERSWITCH_API_KEY}
      HYPERSWITCH_PUBLISHABLE_KEY: ${HYPERSWITCH_PUBLISHABLE_KEY}
      HYPERSWITCH_ADMIN_API_KEY: ${HYPERSWITCH_ADMIN_API_KEY}
      HYPERSWITCH_VAULT_API_KEY: ${HYPERSWITCH_VAULT_API_KEY}
      HYPERSWITCH_BASE_URL: ${HYPERSWITCH_BASE_URL:-https://sandbox.hyperswitch.io}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      merchant:
        condition: service_started

volumes:
  postgres_data:
